{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="min-h-screen pt-32 pb-20 flex items-center justify-center">
    <div class="w-full max-w-md px-4 relative z-10">
        <div class="text-center mb-8">
            <img src="{% static 'images/logo.png' %}" alt="Silverwoods" class="h-14 w-14 rounded-xl object-cover mx-auto mb-4 border border-brown-800/[0.06] dark:border-white/[0.06]" onerror="this.style.display='none'">
            <h1 class="text-2xl font-bold tracking-[0.15em] uppercase" style="font-family:'Playfair Display',serif"><span class="text-brown-800 dark:text-cream-100">SILVER</span><span class="text-gold-500">WOODS</span></h1>
            <p class="text-[9px] tracking-[0.3em] uppercase text-brown-400 dark:text-cream-300/60 mt-1">Admin Dashboard</p>
        </div>
        <div class="bg-white/50 dark:bg-white/[0.04] backdrop-blur-xl rounded-2xl p-8 border border-brown-800/[0.06] dark:border-white/[0.06] shadow-xl shadow-brown-800/[0.03] dark:shadow-black/[0.3]">
            <h2 class="text-lg font-bold text-brown-800 dark:text-cream-100 mb-6" style="font-family:'Playfair Display',serif">Sign In</h2>
            {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-xs flex items-center gap-2">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-brown-400 dark:text-cream-300/60 text-[10px] font-semibold mb-2 tracking-[0.15em] uppercase">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-cream-400 dark:text-cream-100/20 text-sm"></i>
                        <input type="text" name="username" required class="w-full pl-11 pr-4 py-3.5 bg-cream-100/50 dark:bg-white/[0.04] border border-brown-800/[0.06] dark:border-white/[0.06] rounded-xl text-brown-800 dark:text-cream-100 placeholder-cream-400 dark:placeholder-cream-100/20 text-sm focus:border-gold-700 focus:ring-0 outline-none transition-all" placeholder="Enter username">
                    </div>
                </div>
                <div>
                    <label class="block text-brown-400 dark:text-cream-300/60 text-[10px] font-semibold mb-2 tracking-[0.15em] uppercase">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-cream-400 dark:text-cream-100/20 text-sm"></i>
                        <input type="password" name="password" required class="w-full pl-11 pr-4 py-3.5 bg-cream-100/50 dark:bg-white/[0.04] border border-brown-800/[0.06] dark:border-white/[0.06] rounded-xl text-brown-800 dark:text-cream-100 placeholder-cream-400 dark:placeholder-cream-100/20 text-sm focus:border-gold-700 focus:ring-0 outline-none transition-all" placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" class="w-full py-3.5 bg-brown-700 dark:bg-gold-500/20 text-cream-100 dark:text-gold-500 rounded-xl text-[11px] font-semibold tracking-[0.15em] uppercase hover:bg-brown-800 transition-colors">
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
