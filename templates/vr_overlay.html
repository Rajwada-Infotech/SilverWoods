<style>
@keyframes vrPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.1)}50%{box-shadow:0 0 0 16px rgba(201,168,76,0)} }
@keyframes ping { 0%{transform:scale(1);opacity:0.5}100%{transform:scale(1.55);opacity:0} }

/* Blueprint control buttons — gold hover, no blue focus ring */
.ctrl-btn { outline: none; color: rgba(255,255,255,0.55); }
.ctrl-btn:focus { outline: none; box-shadow: none; }
.ctrl-btn:hover {
  background: rgba(201,168,76,0.18) !important;
  border-color: rgba(201,168,76,0.4) !important;
  color: #c9a84c !important;
}
.ctrl-btn:active {
  background: rgba(201,168,76,0.28) !important;
  border-color: rgba(201,168,76,0.55) !important;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.min.js"></script>
<script>
// =====================================================================
// VR WALKTHROUGH - embedded fullscreen overlay
// =====================================================================
var vrScene, vrCamera, vrRenderer, vrControls;
var vrInited = false;
var vrIsLocked = false;
var vrMoveF=false, vrMoveB=false, vrMoveL=false, vrMoveR=false, vrRunning=false;
var vrVelocity = null, vrDirection = null;
var vrPrevTime = 0;
var vrZones = [];
var vrHudTimeout = null;

function openVR() {
  function showOverlay() {
    var overlay = document.getElementById('vr-overlay');
    overlay.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    if (!vrInited) { vrInit(); vrInited = true; }
    // Do NOT request fullscreen here - wait for user to click "Start"
  }
  if (document.fullscreenElement) {
    document.exitFullscreen().then(showOverlay);
  } else {
    showOverlay();
  }
}
window.openVR = openVR;

function openPlots() {
  var el = document.getElementById('plots-overlay');
  document.body.style.overflow = 'hidden';
  // Show overlay immediately (black background covers the flash)
  el.classList.remove('hidden');
  document.getElementById('plots-iframe').src = '/plots/';
  function enterFs() {
    var de = document.documentElement;
    if (!document.fullscreenElement) {
      if (de.requestFullscreen) de.requestFullscreen().catch(function(){});
      else if (de.webkitRequestFullscreen) de.webkitRequestFullscreen();
    }
  }
  if (document.fullscreenElement && document.fullscreenElement !== document.documentElement) {
    document.exitFullscreen().then(enterFs).catch(enterFs);
  } else {
    enterFs();
  }
}
window.openPlots = openPlots;
function closePlots() {
  document.getElementById('plots-overlay').classList.add('hidden');
  document.body.style.overflow = '';
  document.getElementById('plots-iframe').src = 'about:blank';
}
window.closePlots = closePlots;
function switchTo3D() {
  closePlots();
  var wrapper = document.getElementById('blueprint-canvas').parentElement;
  function enterBlueprintFs() {
    wrapper.requestFullscreen().then(function(){
      var c = document.getElementById('blueprint-canvas');
      c.style.height = '100vh';
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      var btn = document.getElementById('btn-fullscreen');
      if (btn) btn.innerHTML = '<i class="fas fa-compress text-xs"></i>';
    }).catch(function(){});
  }
  if (document.fullscreenElement) {
    document.exitFullscreen().then(enterBlueprintFs).catch(enterBlueprintFs);
  } else {
    enterBlueprintFs();
  }
}
window.switchTo3D = switchTo3D;

function closeVR() {
  if (vrControls && vrIsLocked) vrControls.unlock();
  document.getElementById('vr-overlay').classList.add('hidden');
  document.getElementById('vr-blocker').style.display = 'flex';
  document.getElementById('vr-pauser').classList.add('hidden');
  document.getElementById('vr-pauser').classList.remove('flex');
  document.getElementById('vr-crosshair').classList.add('hidden');
  document.getElementById('vr-minimap-wrap').classList.add('hidden');
  document.getElementById('vr-speed-hud').classList.add('hidden');
  document.getElementById('vr-zone-hud').classList.add('hidden');
  document.body.style.overflow = '';
  if (document.fullscreenElement) document.exitFullscreen();
}
window.closeVR = closeVR;

document.addEventListener('fullscreenchange', function() {
  var overlay = document.getElementById('vr-overlay');

  // If VR wants fullscreen and nothing is fullscreen now, re-request on the overlay.
  // This handles the blueprint-fullscreen → VR-fullscreen transition.
  if (vrWantsFullscreen && !document.fullscreenElement && overlay && !overlay.classList.contains('hidden')) {
    vrWantsFullscreen = false;
    if (overlay.requestFullscreen) overlay.requestFullscreen();
    else if (overlay.webkitRequestFullscreen) overlay.webkitRequestFullscreen();
    return;
  }
  vrWantsFullscreen = false;

  // Update blueprint fullscreen button icon when fullscreen exits
  var btn = document.getElementById('btn-fullscreen');
  if (btn && !document.fullscreenElement) {
    var icon = btn.querySelector('i');
    if (icon) { icon.classList.remove('fa-compress'); icon.classList.add('fa-expand'); }
  }
});

function vrInit() {
  var container = document.getElementById('vr-canvas-inner');
  var W = container.clientWidth, H = container.clientHeight;

  vrRenderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  vrRenderer.setSize(W, H);
  vrRenderer.setPixelRatio(window.devicePixelRatio);
  vrRenderer.shadowMap.enabled = true;
  vrRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
  vrRenderer.shadowMap.autoUpdate = true;
  vrRenderer.physicallyCorrectLights = true;
  vrRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  vrRenderer.toneMappingExposure = 1.1;
  container.appendChild(vrRenderer.domElement);

  vrScene = new THREE.Scene();
  vrScene.background = new THREE.Color(0x90c8ec);
  vrScene.fog = new THREE.Fog(0x90c8ec, 70, 300);

  vrCamera = new THREE.PerspectiveCamera(70, W / H, 0.1, 500);

  vrVelocity  = new THREE.Vector3();
  vrDirection = new THREE.Vector3();

  vrControls = new THREE.PointerLockControls(vrCamera, vrRenderer.domElement);
  vrScene.add(vrControls.getObject());

  // Camera spawns outside the gate on the approach road, looking toward the gate
  vrControls.getObject().position.set(110, 1.7, -18);
  vrControls.getObject().rotation.y = -Math.PI / 2;

  var blocker  = document.getElementById('vr-blocker');
  var pauser   = document.getElementById('vr-pauser');
  var crosshair= document.getElementById('vr-crosshair');
  var minimap  = document.getElementById('vr-minimap-wrap');
  var speedHud = document.getElementById('vr-speed-hud');

  document.getElementById('vr-enter-btn').addEventListener('click', function() {
    // Request fullscreen + pointer lock from the same user gesture
    var overlay = document.getElementById('vr-overlay');
    var doLock = function() { vrControls.lock(); };
    if (!document.fullscreenElement) {
      if (overlay.requestFullscreen) {
        overlay.requestFullscreen().then(doLock).catch(doLock);
      } else if (overlay.webkitRequestFullscreen) {
        overlay.webkitRequestFullscreen(); doLock();
      } else { doLock(); }
    } else { doLock(); }
  });
  pauser.addEventListener('click', function(e) { if (e.target !== pauser && !e.target.closest('button[onclick="closeVR()"]')) vrControls.lock(); });

  vrControls.addEventListener('lock', function() {
    vrIsLocked = true;
    blocker.style.display = 'none';
    pauser.classList.add('hidden'); pauser.classList.remove('flex');
    crosshair.classList.remove('hidden');
    minimap.classList.remove('hidden');
    speedHud.classList.remove('hidden');
    vrPrevTime = performance.now();
  });
  vrControls.addEventListener('unlock', function() {
    vrIsLocked = false;
    crosshair.classList.add('hidden');
    speedHud.classList.add('hidden');
    // Only show pause if overlay still open
    if (!document.getElementById('vr-overlay').classList.contains('hidden')) {
      pauser.classList.remove('hidden'); pauser.classList.add('flex');
    }
  });

  // Lighting
  vrScene.add(new THREE.AmbientLight(0xffeedd, 0.7));
  var sun = new THREE.DirectionalLight(0xfff5d0, 1.8);
  sun.position.set(80, 180, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.set(4096, 4096);
  sun.shadow.camera.left=-160; sun.shadow.camera.right=160;
  sun.shadow.camera.top=160;   sun.shadow.camera.bottom=-160;
  sun.shadow.camera.near=0.5;  sun.shadow.camera.far=600;
  sun.shadow.bias = -0.0005;
  vrScene.add(sun);
  var fill = new THREE.DirectionalLight(0x99aaff, 0.25);
  fill.position.set(-60, 50, -40); vrScene.add(fill);

  var skyGeo = new THREE.SphereGeometry(480, 16, 8);
  var skyMat = new THREE.MeshBasicMaterial({ color: 0x90c8ec, side: THREE.BackSide });
  vrScene.add(new THREE.Mesh(skyGeo, skyMat));

  document.addEventListener('keydown', vrKeyDown);
  document.addEventListener('keyup', vrKeyUp);
  window.addEventListener('resize', vrOnResize);

  vrBuildWorld();
  vrDrawMinimap();
  vrAnimate();
}

function vrKeyDown(e) {
  if (document.getElementById('vr-overlay').classList.contains('hidden')) return;
  switch(e.code) {
    case 'ArrowUp':    case 'KeyW': vrMoveF=true; break;
    case 'ArrowLeft':  case 'KeyA': vrMoveL=true; break;
    case 'ArrowDown':  case 'KeyS': vrMoveB=true; break;
    case 'ArrowRight': case 'KeyD': vrMoveR=true; break;
    case 'ShiftLeft':  case 'ShiftRight': vrRunning=true; break;
  }
  var el = document.getElementById('vr-speed-mode');
  if (el) el.textContent = vrRunning ? 'RUN' : 'WALK';
}
function vrKeyUp(e) {
  switch(e.code) {
    case 'ArrowUp':    case 'KeyW': vrMoveF=false; break;
    case 'ArrowLeft':  case 'KeyA': vrMoveL=false; break;
    case 'ArrowDown':  case 'KeyS': vrMoveB=false; break;

function vrBox(w,h,d,col,x,y,z) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({color:col}));

var vrFlatSeq=0;
function vrFlat(w,d,col,x,z,yo) {

function vrTree(x,z,h,r,col) {

  var poleMat=new THREE.MeshLambertMaterial({color:col});

function vrCortenFrame(x,z) {

}

// Flat disc canopy on pole (VR version matching blueprint)
function vrCanopy(x,z) {
  var poleMat=new THREE.MeshLambertMaterial({color:0xa8a49c});
  var discMat=new THREE.MeshLambertMaterial({color:0xd4d0c8,transparent:true,opacity:0.85});
  var pole=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,7.5,8),poleMat);
  pole.position.set(x,3.75,z); pole.castShadow=true; vrScene.add(pole);
  var disc=new THREE.Mesh(new THREE.CylinderGeometry(5.5,5.5,0.18,24),discMat);
  disc.position.set(x,7.6,z); vrScene.add(disc);
  var ring=new THREE.Mesh(new THREE.TorusGeometry(3.8,0.1,6,24), new THREE.MeshLambertMaterial({color:0xb8b4ac}));
  ring.rotation.x=Math.PI/2; ring.position.set(x,7.5,z); vrScene.add(ring);
  for(var i=0;i<10;i++){
    var ang=(i/10)*Math.PI*2;
    var sp=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,5.5,4), new THREE.MeshLambertMaterial({color:0xb8b4ac}));
    sp.position.set(x+Math.cos(ang)*2.75,7.5,z+Math.sin(ang)*2.75);
    sp.rotation.z=Math.PI/2; sp.rotation.y=ang; vrScene.add(sp);
  }
}

function vrDrawMinimap() {
  var c=document.getElementById('vr-minimap');
  if(!c) return;
  var ctx=c.getContext('2d');
  // Clip to circle
  ctx.clearRect(0,0,140,140);
  ctx.save();
  ctx.beginPath(); ctx.arc(70,70,70,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#0d1a0f'; ctx.fillRect(0,0,140,140);
  var sx=140/200, sz=140/130;
  function tx(x){ return (x+90)*sx; } function tz(z){ return (z+35)*sz; }
  ctx.fillStyle='#2a3a28';
  ctx.fillRect(tx(-2)-2,0,4,140);
  ctx.fillRect(tx(8),tz(-18)-2,tx(83)-tx(8),4);
  ctx.fillStyle='#2a7a38'; ctx.fillRect(tx(-10),tz(35),tx(24)-tx(-10),tz(57)-tz(35));
  ctx.fillStyle='#1a80d4'; ctx.fillRect(tx(18),tz(11),tx(38)-tx(18),tz(18)-tz(11));
  ctx.fillStyle='#1a2636'; ctx.fillRect(tx(-9),tz(4),tx(25)-tx(-9),tz(32)-tz(4));
  ctx.fillStyle='#e4ddd4';
  ctx.fillRect(tx(-78),tz(-24),tx(-12)-tx(-78),tz(38)-tz(-24));
  ctx.fillRect(tx(-18),tz(63),tx(42)-tx(-18),tz(100)-tz(63));
  ctx.fillRect(tx(48),tz(-16),tx(92)-tx(48),tz(62)-tz(-16));
  ctx.fillStyle='#c9a84c'; ctx.fillRect(tx(74),tz(-22),5,8);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='bold 6px sans-serif';
  ctx.fillText('GATE',tx(75),tz(-15));
  ctx.fillText('CLUB',tx(-5),tz(16));
  ctx.restore();
}

function vrUpdateMinimap() {
  var c=document.getElementById('vr-minimap');
  if(!c) return;
  vrDrawMinimap();
  var ctx=c.getContext('2d');
  // Re-clip for player dot
  ctx.save();
  ctx.beginPath(); ctx.arc(70,70,70,0,Math.PI*2); ctx.clip();
  var ctx=c.getContext('2d');
  var px=vrControls.getObject().position.x, pz=vrControls.getObject().position.z;
  var sx=140/200, sz=140/130;
  var mx=(px+90)*sx, mz=(pz+35)*sz;
  // Player dot with glow
  ctx.shadowColor='#c9a84c'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(mx,mz,4,0,Math.PI*2);
  ctx.fillStyle='#c9a84c'; ctx.fill();
  ctx.shadowBlur=0;
  // Direction arrow
  var yaw=vrControls.getObject().rotation.y;
  ctx.beginPath(); ctx.moveTo(mx,mz);
  ctx.lineTo(mx+Math.sin(-yaw)*10,mz+Math.cos(-yaw)*10);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

var vrLastProx=0;
function vrCheckProximity() {
  var px=vrControls.getObject().position.x, pz=vrControls.getObject().position.z;
  var hud=document.getElementById('vr-zone-hud');
  for(var i=0;i<vrZones.length;i++){
    var z=vrZones[i];
    var dx=px-z.x, dz=pz-z.z;
    if(Math.sqrt(dx*dx+dz*dz)<z.r){
      document.getElementById('vr-zone-name').textContent=z.name;
      document.getElementById('vr-zone-desc').textContent=z.desc;
      hud.classList.remove('hidden');
      clearTimeout(vrHudTimeout);
      vrHudTimeout=setTimeout(function(){ hud.classList.add('hidden'); },3000);
      return;
    }
  }
}

function vrAnimate() {
  requestAnimationFrame(vrAnimate);
  var time=performance.now();
  if(vrIsLocked){
    var delta=Math.min((time-vrPrevTime)/1000,0.1);
    vrVelocity.x-=vrVelocity.x*10.0*delta;
    vrVelocity.z-=vrVelocity.z*10.0*delta;
    vrDirection.z=Number(vrMoveF)-Number(vrMoveB);
    vrDirection.x=Number(vrMoveR)-Number(vrMoveL);
    vrDirection.normalize();
    var speed=vrRunning?28.0:14.0;
    if(vrMoveF||vrMoveB) vrVelocity.z-=vrDirection.z*speed*delta;
    if(vrMoveL||vrMoveR) vrVelocity.x-=vrDirection.x*speed*delta;
    vrControls.moveRight(-vrVelocity.x*delta);
    vrControls.moveForward(-vrVelocity.z*delta);
    vrControls.getObject().position.y=1.7;
    if(time-vrLastProx>500){ vrCheckProximity(); vrLastProx=time; }
    vrUpdateMinimap();
  }
  vrPrevTime=time;
  vrRenderer.render(vrScene,vrCamera);
}

function vrOnResize() {
  if(!vrRenderer) return;
  var c=document.getElementById('vr-canvas-inner');
  vrCamera.aspect=c.clientWidth/c.clientHeight;
  vrCamera.updateProjectionMatrix();
  vrRenderer.setSize(c.clientWidth,c.clientHeight);
}
</script>
